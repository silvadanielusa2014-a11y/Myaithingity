<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myaithingity</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-container">
        
        <!-- Left Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>Myaithingity</h1>
                <button id="new-character">+ New Character</button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search characters or chats...">
            </div>
            
            <div class="sidebar-nav">
                <button data-page="chat" class="nav-btn active">💬 Chat</button>
                <button data-page="characters" class="nav-btn">👤 Characters</button>
                <button data-page="models" class="nav-btn">🧠 AI Models</button>
                <button data-page="settings" class="nav-btn">⚙ Settings</button>
            </div>
            
            <!-- Character List will go here (populated by JS later) -->
            <div id="character-list" class="character-list">
                <!-- Dynamically filled -->
            </div>
        </aside>

        <!-- Main Area -->
        <main id="app">
            Loading...
        </main>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        window.webllm = webllm;
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
